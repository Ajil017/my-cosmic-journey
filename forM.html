<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Force mobile devices to render the layout as a desktop view instead of breaking the 1200px map -->
    <meta name="viewport" content="width=1200">
    <title>Memorable Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #02010a;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: #d8d8ff;
        }

        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .ambient-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.4;
            animation: pulse-glow 10s infinite alternate;
        }

        .glow-1 {
            background: rgba(139, 92, 246, 0.4);
            top: 10%;
            left: -20%;
        }

        .glow-2 {
            background: rgba(217, 70, 239, 0.3);
            bottom: 10%;
            right: -20%;
            animation-delay: -5s;
        }

        @keyframes pulse-glow {
            0% {
                transform: scale(0.8) translate(0, 0);
                opacity: 0.2;
            }

            100% {
                transform: scale(1.1) translate(100px, -100px);
                opacity: 0.5;
            }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(255, 100, 200, 0.8));
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            animation: float-magical 10s infinite linear;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes float-magical {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
                transform: translateY(80vh) scale(1) rotate(45deg);
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        .journey-container {
            position: relative;
            z-index: 2;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 4em;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 50%, #fbc2eb 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s linear infinite;
            text-shadow: 0 0 30px rgba(161, 140, 209, 0.5);
            letter-spacing: 2px;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .subtitle {
            text-align: center;
            color: #a7a7c7;
            font-size: 1.3em;
            font-weight: 300;
            margin-bottom: 60px;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .path-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 1200 / 1800;
            margin: 40px auto;
        }

        .s-path {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            filter: drop-shadow(0 0 12px rgba(217, 70, 239, 0.8));
        }

        .s-path svg {
            width: 100%;
            height: 100%;
        }

        .milestones {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 5;
        }

        .milestone {
            position: absolute;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .milestone.locked {
            cursor: not-allowed;
            opacity: 0.6;
            filter: grayscale(100%) blur(1px);
        }

        .milestone.unlocked:hover {
            transform: scale(1.2) translateY(-15px);
            z-index: 20;
        }

        .milestone-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(15, 10, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(217, 70, 239, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4), inset 0 0 20px rgba(217, 70, 239, 0.2);
            position: relative;
            overflow: hidden;
        }

        .milestone.unlocked .milestone-icon {
            animation: orb-pulse 3s infinite alternate;
        }

        @keyframes orb-pulse {
            0% {
                box-shadow: 0 0 20px rgba(139, 92, 246, 0.4), inset 0 0 20px rgba(217, 70, 239, 0.2);
            }

            100% {
                box-shadow: 0 0 50px rgba(217, 70, 239, 0.8), inset 0 0 40px rgba(255, 255, 255, 0.4);
            }
        }

        .milestone.locked .milestone-icon {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .milestone.unlocked .milestone-icon:hover {
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.8);
            border-color: #fff;
            background: rgba(217, 70, 239, 0.3);
        }

        .lock-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 30px;
            height: 30px;
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2em;
        }

        .milestone-label {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 10, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            color: #f8fafc;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateX(-50%) translateY(30px);
            border: 1px solid rgba(217, 70, 239, 0.4);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .milestone.unlocked:hover .milestone-label {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .traveler-pointer {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #fff 0%, #fbc2eb 100%);
            border-radius: 50% 50% 50% 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
            box-shadow: 0 0 30px #fff, 0 0 50px #d946ef;
            border: 3px solid #fff;
            animation: pointerGlow 1.5s infinite alternate;
        }

        @keyframes pointerGlow {
            0% {
                box-shadow: 0 0 20px #fff, 0 0 40px #d946ef;
                transform: scale(1) rotate(-45deg);
            }

            100% {
                box-shadow: 0 0 40px #fff, 0 0 80px #a18cd1;
                transform: scale(1.2) rotate(-45deg);
            }
        }

        .traveler-pointer::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #d946ef;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff;
        }

        /* Modal styling */
        .content-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .content-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(15, 10, 30, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 50px;
            border-radius: 35px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 80px rgba(217, 70, 239, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
            transform: scale(0.6) translateY(100px) rotateX(20deg);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform-style: preserve-3d;
        }

        .content-modal.show .modal-content {
            transform: scale(1) translateY(0) rotateX(0deg);
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 2em;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .close-btn:hover {
            background: #d946ef;
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 0 30px #d946ef;
            border-color: #fff;
            color: #fff;
        }

        .modal-header {
            color: #fff;
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 50%, #fbc2eb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(161, 140, 209, 0.3);
            animation: fadeInDown 0.8s ease-out;
        }

        .modal-body {
            color: #cbd5e1;
            font-size: 1.25em;
            line-height: 1.8;
            text-align: center;
            font-weight: 300;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .modal-image {
            width: 100%;
            max-width: 450px;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            margin: 25px 0;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(217, 70, 239, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .modal-image.loaded {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .modal-image:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 0 60px rgba(217, 70, 239, 0.6);
            border-color: #fbc2eb;
        }

        .modal-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes imageFloat {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-10px) scale(1.02);
            }
        }

        .modal-image.loaded {
            animation: imageFloat 6s ease-in-out infinite;
        }

        .progress-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 10, 30, 0.8);
            backdrop-filter: blur(15px);
            padding: 18px 40px;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
            z-index: 10;
            transition: all 0.4s ease;
            border: 1px solid rgba(217, 70, 239, 0.4);
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(220, 38, 38, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 30px 40px;
            border-radius: 20px;
            font-size: 1.3em;
            text-align: center;
            box-shadow: 0 0 50px rgba(220, 38, 38, 0.6);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 2px solid #fca5a5;
        }

        .error-message.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .controls {
            position: fixed;
            bottom: 80px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .control-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .control-btn,
        .music-btn {
            width: 45px;
            height: 45px;
            background: rgba(15, 10, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(217, 70, 239, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .control-btn:hover,
        .music-btn:hover {
            background: rgba(217, 70, 239, 0.4);
            transform: scale(1.15);
            box-shadow: 0 0 25px #d946ef;
            border-color: #fff;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .image-loading {
            width: 100%;
            height: 250px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 100%);
            background-size: 200% 100%;
            animation: imageShimmer 1.5s infinite;
            border-radius: 20px;
            margin: 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1em;
        }

        @keyframes imageShimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .milestone-preview {
            position: absolute;
            top: -110px;
            left: 50%;
            transform: translateX(-50%) scale(0.5);
            width: 140px;
            height: 90px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6), 0 0 20px rgba(217, 70, 239, 0.4);
            pointer-events: none;
            z-index: 30;
        }

        .milestone.unlocked:hover .milestone-preview {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .music-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .music-btn.muted {
            background: rgba(220, 38, 38, 0.6);
            border-color: #fca5a5;
        }

        .music-btn.playing {
            animation: musicPulse 2s infinite;
        }

        @keyframes musicPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(217, 70, 239, 0.4);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px #d946ef;
            }
        }
    </style>
</head>

        let currentMilestone = 0;
        let visitedMilestones = new Set();
        let currentPathPosition = 0;
        let pathLength = 0;
        let pathElement = null;

        function createFloatingHearts() {
            const heartsContainer = document.querySelector('.floating-hearts');

            const emojiHearts = ['💕', '💖', '💗', '💙', '💜', '🤍', '💛', '💝', '💚', '🧡', '🩵', '💓', '💞', '🩶'];
            const imageHearts = [
                'heart1.png',
                'heart2.png',
                'star1.png'
            ];

            setInterval(() => {
                for (let i = 0; i < 3; i++) {
                    // Randomly decide whether to show an emoji or an image
                    const isImage = Math.random() < 0.5;

                    let heart;
                    if (isImage) {
                        heart = document.createElement('img');
                        heart.src = imageHearts[Math.floor(Math.random() * imageHearts.length)];
                        heart.style.width = (Math.random() * 20 + 30) + 'px'; // Size for image
                    } else {
                        heart = document.createElement('div');
                        heart.textContent = emojiHearts[Math.floor(Math.random() * emojiHearts.length)];
                        heart.style.fontSize = (Math.random() * 20 + 20) + 'px'; // Size for emoji
                    }

                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    heartsContainer.appendChild(heart);

                    setTimeout(() => {
                        heart.remove();
                    }, 8000);
                }
            }, 1000);
        }


        function initializePath() {
            pathElement = document.getElementById('sPath');
            pathLength = pathElement.getTotalLength();

            // Position traveler at start
            const startPoint = pathElement.getPointAtLength(0);
            const traveler = document.getElementById('travelerPointer');
            traveler.style.left = `calc(${(startPoint.x / 1200) * 100}%)`;
            traveler.style.top = `calc(${(startPoint.y / 1800) * 100}%)`;

            // Create milestones
            createMilestones();
        }

        function createMilestones() {
            const container = document.getElementById('milestonesContainer');

            milestones.forEach((milestone, index) => {
                const milestoneEl = document.createElement('div');
                milestoneEl.className = index === 0 ? 'milestone unlocked' : 'milestone locked';
                milestoneEl.setAttribute('data-milestone', index);
                milestoneEl.style.left = `calc(${(milestone.position.x / 1200) * 100}% - 50px)`;
                milestoneEl.style.top = `calc(${(milestone.position.y / 1800) * 100}% - 50px)`;

                const icon = document.createElement('div');
                icon.className = 'milestone-icon';
                icon.textContent = milestone.icon;

                const label = document.createElement('div');
                label.className = 'milestone-label';
                label.textContent = milestone.title;

                // Add image preview (optional)
                const preview = document.createElement('div');
                preview.className = 'milestone-preview';
                preview.style.backgroundImage = `url(${milestone.image}?v=${new Date().getTime()})`;

                milestoneEl.appendChild(preview);
                milestoneEl.appendChild(icon);
                milestoneEl.appendChild(label);

                if (index > 0) {
                    const lock = document.createElement('div');
                    lock.className = 'lock-icon';
                    lock.textContent = '🔒';
                    milestoneEl.appendChild(lock);
                }

                container.appendChild(milestoneEl);
            });
        }

        function movePointer(direction) {
            const moveDistance = 20;
            let newPosition = currentPathPosition;

            switch (direction) {
                case 'up':
                    newPosition = Math.max(0, currentPathPosition - moveDistance);
                    break;
                case 'down':
                    newPosition = Math.min(pathLength, currentPathPosition + moveDistance);
                    break;
                case 'left':
                    newPosition = Math.max(0, currentPathPosition - moveDistance);
                    break;
                case 'right':
                    newPosition = Math.min(pathLength, currentPathPosition + moveDistance);
                    break;
            }

            if (newPosition !== currentPathPosition) {
                currentPathPosition = newPosition;
                updatePointerPosition();
                updatePathProgress();
                checkMilestoneProximity();
            }
        }

        function updatePointerPosition() {
            const point = pathElement.getPointAtLength(currentPathPosition);
            const traveler = document.getElementById('travelerPointer');
            traveler.style.left = `calc(${(point.x / 1200) * 100}%)`;
            traveler.style.top = `calc(${(point.y / 1800) * 100}%)`;
        }

        function updatePathProgress() {
            const progressPath = document.getElementById('progressPath');
            const progressPercentage = (currentPathPosition / pathLength) * 100;
            progressPath.style.strokeDasharray = `${progressPercentage} ${100 - progressPercentage}`;
        }

        let nearbyMilestone = 0; // Initialize to first milestone (index 0)

        function checkMilestoneProximity() {
            const currentPoint = pathElement.getPointAtLength(currentPathPosition);
            let foundNearby = false;

            milestones.forEach((milestone, index) => {
                const distance = Math.sqrt(
                    Math.pow(currentPoint.x - milestone.position.x, 2) +
                    Math.pow(currentPoint.y - milestone.position.y, 2)
                );

                if (distance < 80) { // Increased detection radius to 80px
                    const milestoneEl = document.querySelector(`[data-milestone="${index}"]`);
                    if (milestoneEl && milestoneEl.classList.contains('unlocked')) {
                        milestoneEl.style.transform = 'scale(1.2)';
                        milestoneEl.style.zIndex = '20';
                        nearbyMilestone = index; // Set the nearby milestone
                        foundNearby = true;

                        // Update progress indicator to show Enter key hint
                        document.getElementById('progressIndicator').textContent =
                            `Near "${milestones[index].title}" - Press Enter or Click to explore!`;
                    }
                } else {
                    const milestoneEl = document.querySelector(`[data-milestone="${index}"]`);
                    if (milestoneEl) {
                        milestoneEl.style.transform = '';
                        milestoneEl.style.zIndex = '';
                    }
                }
            });

            // If no milestone found nearby, check if we're at the very start (first milestone)
            if (!foundNearby && currentPathPosition <= 50) {
                nearbyMilestone = 0; // Always allow first milestone at start
                document.getElementById('progressIndicator').textContent =
                    `Near "${milestones[0].title}" - Press Enter or Click to explore!`;
            } else if (!foundNearby) {
                nearbyMilestone = -1;
                updateProgress(); // Reset progress text
            }
        }

        function setupControls() {
            let moveInterval = null;

            function startMoving(direction) {
                if (moveInterval) return;
                movePointer(direction); // Move once immediately
                moveInterval = setInterval(() => {
                    movePointer(direction);
                }, 50); // Continuously move every 50ms
            }

            function stopMoving() {
                if (moveInterval) {
                    clearInterval(moveInterval);
                    moveInterval = null;
                }
            }

            const buttons = [
                { id: 'upBtn', dir: 'up' },
                { id: 'downBtn', dir: 'down' },
                { id: 'leftBtn', dir: 'left' },
                { id: 'rightBtn', dir: 'right' }
            ];

            buttons.forEach(btn => {
                const el = document.getElementById(btn.id);
                
                // Prevent default behavior like zooming or text selection on mobile
                el.style.webkitUserSelect = 'none';

                // Touch support for mobile phones
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // Stop screen from scrolling/zooming immediately
                    startMoving(btn.dir);
                }, { passive: false });
                
                el.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    stopMoving();
                }, { passive: false });
                
                el.addEventListener('touchcancel', stopMoving);

                // Mouse support for desktops
                el.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    startMoving(btn.dir);
                });
                
                el.addEventListener('mouseup', stopMoving);
                el.addEventListener('mouseleave', stopMoving);
            });

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowUp':
                        e.preventDefault();
                        movePointer('up');
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        movePointer('down');
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        movePointer('left');
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        movePointer('right');
                        break;
                    case 'Enter': // Add Enter key functionality
                        e.preventDefault();
                        if (nearbyMilestone !== -1) {
                            const milestoneEl = document.querySelector(`[data-milestone="${nearbyMilestone}"]`);
                            if (milestoneEl && milestoneEl.classList.contains('unlocked')) {
                                showMilestoneContent(nearbyMilestone);
                            }
                        }
                        break;
                }
            });
        }

        function unlockNextMilestone(currentIndex) {
            if (currentIndex + 1 < milestones.length) {
                const nextMilestone = document.querySelector(`[data-milestone="${currentIndex + 1}"]`);
                nextMilestone.classList.remove('locked');
                nextMilestone.classList.add('unlocked');
                nextMilestone.querySelector('.lock-icon').remove();

                // Add unlock animation
                nextMilestone.style.animation = 'unlockAnimation 0.6s ease-out';
                setTimeout(() => {
                    nextMilestone.style.animation = '';
                }, 600);
            }
        }

        function showMilestoneContent(index) {
            if (index === milestones.length - 1 && !confirm("Are you sure you want to finish this beautiful journey?")) {
                showErrorMessage();
                return;
            }

            const modal = document.getElementById('contentModal');
            const header = document.getElementById('modalHeader');
            const body = document.getElementById('modalBody');

            // Create content wrapper
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'modal-content-wrapper';

            // Create image element with loading state
            const imageContainer = document.createElement('div');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'image-loading';
            loadingDiv.textContent = 'Loading image...';
            imageContainer.appendChild(loadingDiv);

            const img = document.createElement('img');
            img.className = 'modal-image';
            img.alt = milestones[index].title;

            // Handle image loading
            img.onload = function () {
                loadingDiv.remove();
                imageContainer.appendChild(img);
                // Trigger animation after a small delay
                setTimeout(() => {
                    img.classList.add('loaded');
                }, 100);
            };

            img.onerror = function () {
                loadingDiv.textContent = '✨ Imagine a beautiful moment here ✨';
                loadingDiv.style.background = 'linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.2))';
            };

            // Set image source
            img.src = milestones[index].image + '?v=' + new Date().getTime();

            // Create text content
            const textContent = document.createElement('div');
            textContent.style.opacity = '0';
            textContent.style.transform = 'translateY(20px)';
            textContent.style.transition = 'all 0.6s ease';
            textContent.textContent = milestones[index].content;

            // Clear previous content and add new content
            header.textContent = milestones[index].title;
            body.innerHTML = '';

            contentWrapper.appendChild(imageContainer);
            contentWrapper.appendChild(textContent);
            body.appendChild(contentWrapper);

            // Animate text content after image loads
            setTimeout(() => {
                textContent.style.opacity = '1';
                textContent.style.transform = 'translateY(0)';
            }, 300);

            modal.classList.add('show');
            visitedMilestones.add(index);
            updateProgress();
            unlockNextMilestone(index);
        }

        function closeModal() {
            document.getElementById('contentModal').classList.remove('show');
        }

        function showErrorMessage() {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 3000);
        }

        function updateProgress() {
            const progressIndicator = document.getElementById('progressIndicator');
            const totalMilestones = milestones.length;
            const visitedCount = visitedMilestones.size;

            if (visitedCount === 0) {
                progressIndicator.textContent = "Start your journey by clicking the first milestone";
            } else if (visitedCount === totalMilestones) {
                progressIndicator.textContent = "Journey complete! But the memories live on forever 💕";
            } else {
                progressIndicator.textContent = `Memories discovered: ${visitedCount}/${totalMilestones} - Continue your journey!`;
            }
        }

        function initializeMilestones() {
            const milestoneElements = document.querySelectorAll('.milestone');

            milestoneElements.forEach((milestone, index) => {
                milestone.addEventListener('click', () => {
                    if (milestone.classList.contains('locked')) {
                        milestone.style.animation = 'shake 0.5s ease-in-out';
                        setTimeout(() => {
                            milestone.style.animation = '';
                        }, 500);
                        return;
                    }

                    // Check if pointer is close enough
                    const currentPoint = pathElement.getPointAtLength(currentPathPosition);
                    const milestonePos = milestones[index].position;
                    const distance = Math.sqrt(
                        Math.pow(currentPoint.x - milestonePos.x, 2) +
                        Math.pow(currentPoint.y - milestonePos.y, 2)
                    );

                    if (distance < 60) {
                        showMilestoneContent(index);
                    }
                });
            });
        }

        // Add CSS for animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes unlockAnimation {
                0% { transform: scale(1) rotate(0deg); }
                25% { transform: scale(1.1) rotate(-5deg); }
                50% { transform: scale(1.2) rotate(5deg); }
                75% { transform: scale(1.1) rotate(-2deg); }
                100% { transform: scale(1) rotate(0deg); }
            }
            
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        // Close modal when clicking outside
        document.getElementById('contentModal').addEventListener('click', (e) => {
            if (e.target.id === 'contentModal') {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            createFloatingHearts();
            initializePath();
            initializeMilestones();
            setupControls();
            updateProgress();
        });
        let isPlaying = false;
        let isMuted = false;
        const backgroundMusic = document.getElementById('backgroundMusic');
        const musicToggle = document.getElementById('musicToggle');

        // Function to start background music
        function initializeMusic() {
            backgroundMusic.volume = 0.3;
            backgroundMusic.autoplay = true;
            backgroundMusic.muted = false; // keep unmuted

            const playPromise = backgroundMusic.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updateMusicButton();
                    console.log("Music started successfully");
                }).catch(error => {
                    console.log("Autoplay failed:", error);
                    // Don't mute on fallback — wait for user interaction instead
                    isPlaying = false;
                    updateMusicButton();
                });
            }
        }


        // Function to toggle music
        function toggleMusic() {
            if (isPlaying) {
                backgroundMusic.pause();
                isPlaying = false;
            } else {
                const playPromise = backgroundMusic.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isPlaying = true;
                    }).catch(error => {
                        console.log("Play failed:", error);
                    });
                }
            }
            updateMusicButton();
        }

        // Function to update music button appearance
        function updateMusicButton() {
            if (isPlaying) {
                musicToggle.textContent = '🎵';
                musicToggle.classList.add('playing');
                musicToggle.classList.remove('muted');
                musicToggle.title = 'Pause Music';
            } else {
                musicToggle.textContent = '🔇';
                musicToggle.classList.remove('playing');
                musicToggle.classList.add('muted');
                musicToggle.title = 'Play Music';
            }
        }

        // Event listeners
        musicToggle.addEventListener('click', toggleMusic);

        // Initialize music when page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Small delay to ensure everything is loaded
            setTimeout(() => {
                initializeMusic();
            }, 1000);
        });

        // Also try to start music on first user interaction
        document.addEventListener('click', function startMusicOnInteraction() {
            if (!isPlaying) {
                initializeMusic();
            }
            // Remove this listener after first interaction
            document.removeEventListener('click', startMusicOnInteraction);
        }, { once: true });

        // --- Stars Canvas Background Logic ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, starArray;

        function initStars() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            starArray = [];
            for (let i = 0; i < 300; i++) {
                starArray.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 1.5 + 0.5,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    alpha: Math.random(),
                    dAlpha: (Math.random() * 0.02) - 0.01
                });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            starArray.forEach(s => {
                s.x += s.vx;
                s.y += s.vy;
                s.alpha += s.dAlpha;
                if (s.alpha <= 0 || s.alpha >= 1) s.dAlpha = -s.dAlpha;
                if (s.x < 0) s.x = width; if (s.x > width) s.x = 0;
                if (s.y < 0) s.y = height; if (s.y > height) s.y = 0;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        animateStars();

        // Start music on ANY user interaction
        ['click', 'touchstart', 'keydown'].forEach(event => {
            document.addEventListener(event, () => {
                if (!isPlaying) {
                    backgroundMusic.play().then(() => {
                        isPlaying = true;
                        updateMusicButton();
                    }).catch(error => {
                        console.log("User interaction play failed:", error);
                    });
                }
            }, { once: true });
        });
        function createFloatingGhosts() {
            const container = document.querySelector('.floating-hearts');
            if (!container) return;

            setInterval(() => {
                const ghost = document.createElement('img');
                ghost.src = 'ghost.png';
                ghost.className = 'heart';
                // Using 'heart' class for float-magical animation
                ghost.style.left = Math.random() * 90 + 'vw';
                const size = Math.random() * 20 + 35; // reduced size: 35px to 55px
                ghost.style.width = size + 'px';
                ghost.style.height = 'auto';
                ghost.style.animationDuration = (Math.random() * 10 + 10) + 's';
                ghost.style.opacity = Math.random() * 0.4 + 0.6;
                // Add a subtle glowing shadow to the ghost
                ghost.style.filter = 'drop-shadow(0 0 15px rgba(255,100,200,0.8))';

                container.appendChild(ghost);

                setTimeout(() => {
                    if (ghost.parentNode) ghost.remove();
                }, 22000);
            }, 10000); // 1 ghost every 10 seconds
        }

        createFloatingGhosts();

    </script>
